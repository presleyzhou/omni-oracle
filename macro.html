<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Macro & Finance Nowcast — Omni Oracle</title>
<meta name="description" content="Real-time GDP and inflation nowcasts, Fed decision tree (model vs. market odds), and ensemble attribution — DFM, random forest and BVAR in one dashboard." />
<link rel="canonical" href="https://presleyzhou.github.io/omni-oracle/macro.html" />
<meta name="theme-color" content="#0b0f17" />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="Omni Oracle" />
<meta property="og:title" content="Macro & Finance Nowcast — Omni Oracle" />
<meta property="og:description" content="Real-time GDP and inflation nowcasts, Fed decision tree (model vs. market odds), and ensemble attribution — DFM, random forest and BVAR in one dashboard." />
<meta property="og:url" content="https://presleyzhou.github.io/omni-oracle/macro.html" />
<meta name="twitter:card" content="summary" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔮</text></svg>" />
<link rel="stylesheet" href="css/style.css?v=7" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="logo" href="index.html">Omni<span>Oracle</span></a>
    <div class="nav-links">
      <a href="index.html" data-i18n="nav.home">Home</a>
      <a href="macro.html" data-i18n="nav.macro">Macro & Finance</a>
      <a href="trends.html" data-i18n="nav.trends">Trend Companies</a>
      <a href="markets.html" data-i18n="nav.markets">Markets</a>
      <a href="simworld.html" data-i18n="nav.sim">Sim Worlds</a>
      <a href="tournament.html" data-i18n="nav.tournament">Tournament</a>
      <a href="methodology.html" data-i18n="nav.method">Methodology</a>
    </div>
  </div>
</nav>

<section>
  <div class="container">
    <h1 class="section-title" data-i18n="mac.title"></h1>
    <p class="section-sub" data-i18n="mac.sub"></p>

    <div class="stats-bar" style="margin-bottom: 28px;">
      <div class="stat"><div class="num">2.3%</div><div class="lbl" data-i18n="mac.stat1"></div></div>
      <div class="stat"><div class="num">2.3%</div><div class="lbl" data-i18n="mac.stat2"></div></div>
      <div class="stat"><div class="num">2.5%</div><div class="lbl" data-i18n="mac.stat3"></div></div>
      <div class="stat"><div class="num down" id="recProb">23%</div><div class="lbl" data-i18n="mac.stat4"></div></div>
    </div>

    <div class="grid grid-2">
      <div class="card">
        <h3 data-i18n="mac.gdp.title"></h3>
        <p style="margin-bottom:14px;" data-i18n="mac.gdp.desc"></p>
        <div class="chart-box"><canvas id="gdpChart"></canvas></div>
      </div>
      <div class="card">
        <h3 data-i18n="mac.cpi.title"></h3>
        <p style="margin-bottom:14px;" data-i18n="mac.cpi.desc"></p>
        <div class="chart-box"><canvas id="cpiChart"></canvas></div>
      </div>
      <div class="card">
        <h3 data-i18n="mac.news.title"></h3>
        <p style="margin-bottom:14px;" data-i18n="mac.news.desc"></p>
        <div class="chart-box"><canvas id="newsChart"></canvas></div>
      </div>
      <div class="card">
        <h3 id="fedTitle"></h3>
        <p style="margin-bottom:14px;" data-i18n="mac.fed.desc"></p>
        <div class="chart-box"><canvas id="fedChart"></canvas></div>
      </div>
    </div>

    <div class="card" style="margin-top:18px;">
      <h3 data-i18n="mac.ens.title"></h3>
      <p style="margin-bottom:14px;" data-i18n="mac.ens.desc"></p>
      <div class="chart-box short"><canvas id="ensembleChart"></canvas></div>
    </div>

    <div class="disclaimer" data-i18n="mac.disclaimer"></div>
  </div>
</section>

<footer>
  <div class="container footer-inner">
    <div data-i18n="footer.copy"></div>
    <div><a href="methodology.html" data-i18n="footer.method"></a></div>
  </div>
</footer>

<script src="js/data.js?v=6"></script>
<script src="js/i18n.js?v=6"></script>
<script src="js/app.js?v=6"></script>
<script>
const M = OO.macro;
let charts = [];

function buildCharts() {
  charts.forEach(c => c.destroy());
  charts = [];

  document.getElementById("recProb").textContent = fmtPct(M.recessionProb12m);
  document.getElementById("fedTitle").textContent = OO_T("mac.fed.prefix") + M.fedMeeting;

  charts.push(new Chart(document.getElementById("gdpChart"), {
    type: "line",
    data: {
      labels: M.quarters,
      datasets: [
        { label: OO_T("ch.nowcast"), data: M.gdpNowcast, borderColor: OO_COLORS.accent, backgroundColor: OO_COLORS.accent, tension: 0.3 },
        { label: OO_T("ch.spf"), data: M.gdpSPF, borderColor: OO_COLORS.purple, backgroundColor: OO_COLORS.purple, borderDash: [6,4], tension: 0.3 },
        { label: OO_T("ch.actual"), data: M.gdpActual, borderColor: OO_COLORS.green, backgroundColor: OO_COLORS.green, pointStyle: "rectRot", pointRadius: 5, showLine: false },
      ],
    },
    options: { maintainAspectRatio: false, scales: { y: { title: { display: true, text: "% SAAR" } } } },
  }));

  charts.push(new Chart(document.getElementById("cpiChart"), {
    type: "line",
    data: {
      labels: M.months,
      datasets: [
        { label: OO_T("ch.cpi"), data: M.cpiYoY, borderColor: OO_COLORS.amber, backgroundColor: OO_COLORS.amber, tension: 0.3 },
        { label: OO_T("ch.core"), data: M.coreYoY, borderColor: OO_COLORS.red, backgroundColor: OO_COLORS.red, tension: 0.3 },
      ],
    },
    options: { maintainAspectRatio: false, scales: { y: { title: { display: true, text: "% YoY" } } } },
  }));

  charts.push(new Chart(document.getElementById("newsChart"), {
    type: "bar",
    data: {
      labels: M.newsDecomp.map(d => d.release),
      datasets: [{
        label: OO_T("ch.newsLabel"),
        data: M.newsDecomp.map(d => d.impact),
        backgroundColor: M.newsDecomp.map(d => d.impact >= 0 ? "rgba(34,197,94,0.7)" : "rgba(239,68,68,0.7)"),
      }],
    },
    options: { maintainAspectRatio: false, indexAxis: "y", plugins: { legend: { display: false } } },
  }));

  charts.push(new Chart(document.getElementById("fedChart"), {
    type: "bar",
    data: {
      labels: M.fedProbs.map(d => d.move),
      datasets: [
        { label: OO_T("ch.model"), data: M.fedProbs.map(d => d.model), backgroundColor: "rgba(79,140,255,0.75)" },
        { label: OO_T("ch.marketOdds"), data: M.fedProbs.map(d => d.market), backgroundColor: "rgba(139,92,246,0.75)" },
      ],
    },
    options: {
      maintainAspectRatio: false,
      scales: { y: { max: 0.7, ticks: { callback: v => (100*v) + "%" } } },
    },
  }));

  const ensKeys = ["ens.dfm", "ens.rf", "ens.bvar", "ens.crowd", "ens.mkt"];
  charts.push(new Chart(document.getElementById("ensembleChart"), {
    type: "bar",
    data: {
      labels: [OO_T("ch.ensLabel")],
      datasets: OO.macro.ensemble.map((e, i) => ({
        label: OO_T(ensKeys[i]),
        data: [e.weight],
        backgroundColor: [OO_COLORS.accent, OO_COLORS.purple, OO_COLORS.green, OO_COLORS.amber, OO_COLORS.red][i],
      })),
    },
    options: {
      maintainAspectRatio: false, indexAxis: "y",
      scales: { x: { stacked: true, max: 1, ticks: { callback: v => (100*v) + "%" } }, y: { stacked: true } },
    },
  }));
}

buildCharts();
document.addEventListener("oo:lang", buildCharts);
</script>
</body>
</html>
