<section>
  <div class="container">
    <h1 class="section-title" data-i18n="tr.title"></h1>
    <p class="section-sub" data-i18n="tr.sub"></p>

    <h2 class="section-title" style="font-size:1.25rem;" data-i18n="tr.themes.title"></h2>
    <p class="section-sub" data-i18n="tr.themes.sub"></p>
    <div class="grid grid-4" id="themeGrid"></div>

    <h2 class="section-title" style="font-size:1.25rem; margin-top:44px;" data-i18n="tr.score.title"></h2>
    <p class="section-sub" data-i18n="tr.score.sub"></p>
    <div class="card" style="overflow-x:auto;">
      <table id="companyTable">
        <thead>
          <tr>
            <th data-i18n="tr.th.ticker"></th><th data-i18n="tr.th.company"></th><th data-i18n="tr.th.px"></th><th data-i18n="tr.th.theme"></th>
            <th data-i18n="tr.th.innov"></th><th data-i18n="tr.th.trend"></th><th data-i18n="tr.th.tone"></th><th data-i18n="tr.th.decile"></th>
            <th data-i18n="tr.th.milestone"></th><th data-i18n="tr.th.odds"></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="disclaimer" data-i18n="tr.disclaimer"></div>
  </div>
</section>

<footer>
  <div class="container footer-inner">
    <div data-i18n="footer.copy"></div>
    <div><a href="methodology.html" data-i18n="footer.method"></a></div>
  </div>
</footer>

<script src="js/data.js?v=25"></script>
<script src="js/i18n.js?v=25"></script>
<script src="js/app.js?v=25"></script>
<script>
function renderThemes() {
  document.getElementById("themeGrid").innerHTML = OO.themes.map(t => `
    <div class="card">
      <h3>${t.name}</h3>
      <p>${t.desc}</p>
      <div class="maturity"><div class="fill" style="width:${t.maturity}%"></div></div>
      <div class="theme-stats">
        <span>${OO_T("tr.maturity")} ${t.maturity}/100</span>
        <span>${t.firms} ${OO_T("tr.firms")} · 12m ${t.ret12m}</span>
      </div>
    </div>
  `).join("");
}

function badge(v) {
  const cls = v >= 80 ? "hi" : v >= 60 ? "mid" : "lo";
  return `<span class="score-badge ${cls}">${v}</span>`;
}
function decileBadge(d) {
  const cls = d >= 8 ? "hi" : d >= 5 ? "mid" : "lo";
  return `<span class="score-badge ${cls}">D${d}</span>`;
}

function renderCompanies() {
  document.querySelector("#companyTable tbody").innerHTML = OO.companies.map(c => `
    <tr>
      <td class="num-cell"><strong>${c.ticker}</strong></td>
      <td>${c.name}</td>
      <td class="num-cell">${LIVEPX[c.ticker]
        ? `$${LIVEPX[c.ticker].p.toLocaleString("en-US")} <span class="${LIVEPX[c.ticker].cp >= 0 ? "pos" : "neg"}" style="font-size:0.78rem;">${LIVEPX[c.ticker].cp >= 0 ? "+" : ""}${LIVEPX[c.ticker].cp.toFixed(2)}%</span>`
        : "—"}</td>
      <td><span class="tag purple">${c.theme}</span></td>
      <td>${badge(c.innov)}</td>
      <td>${badge(c.trend)}</td>
      <td>${badge(c.tone)}</td>
      <td>${decileBadge(c.mlDecile)}</td>
      <td style="color:var(--text-dim); font-size:0.85rem;">${c.milestone.q}</td>
      <td class="num-cell ${c.milestone.p >= 0.5 ? "pos" : "neg"}">${Math.round(c.milestone.p * 100)}%</td>
    </tr>
  `).join("");
}

const LIVEPX = {};
function renderAll() { renderThemes(); renderCompanies(); }
renderAll();

/* live quotes for scorecard companies (stockanalysis.com public API; cells show em-dash on failure) */
Promise.all(OO.companies.map(c =>
  fetch("https://stockanalysis.com/api/quotes/s/" + c.ticker)
    .then(r => r.ok ? r.json() : null).catch(() => null)
    .then(d => { if (d && d.data && d.data.p != null) LIVEPX[c.ticker] = { p: d.data.p, cp: d.data.cp || 0 }; })
)).then(renderCompanies);
document.addEventListener("oo:lang", renderAll);
</script>
</body>
</html>
