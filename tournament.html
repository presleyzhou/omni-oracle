<!DOCTYPE html>

<head>
<meta charset="UTF-8" />

<meta name="description" content="Good-Judgment-style forecaster tournament: Brier-scored leaderboards, calibration curves and forecast-source comparison." />
<link rel="canonical" href="https://presleyzhou.github.io/omni-oracle/tournament.html" />
<meta name="theme-color" content="#0b0f17" />
<link rel="manifest" href="manifest.webmanifest" />
<meta property="og:type" content="website" />

<meta property="og:title" content="Forecaster Tournament — Omni Oracle" />
<meta property="og:description" content="Good-Judgment-style forecaster tournament: Brier-scored leaderboards, calibration curves and forecast-source comparison." />
<meta property="og:url" content="https://presleyzhou.github.io/omni-oracle/tournament.html" />

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔮</text></svg>" />
<link rel="stylesheet" href="css/style.css?v=11" />
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin="anonymous" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>

<nav aria-label="Main">
  <div class="nav-inner">
    <a class="logo" href="index.html">Omni<span>Oracle</span></a>
    <div class="nav-links">
      <a href="index.html" data-i18n="nav.home">Home</a>
      <a href="macro.html" data-i18n="nav.macro">Macro & Finance</a>
      <a href="trends.html" data-i18n="nav.trends">Trend Companies</a>
      <a href="markets.html" data-i18n="nav.markets">Markets</a>
      <a href="simworld.html" data-i18n="nav.sim">Sim Worlds</a>
      <a href="tournament.html" data-i18n="nav.tournament">Tournament</a>
      <a href="methodology.html" data-i18n="nav.method">Methodology</a>
    </div>
  </div>
</nav>

<section>
  <div class="container">
    <h1 class="section-title" data-i18n="tour.title"></h1>
    <p class="section-sub" data-i18n="tour.sub"></p>

    <div class="stats-bar" style="margin-bottom:28px;">
      <div class="stat"><div class="num">0.121</div><div class="lbl" data-i18n="tour.stat1"></div></div>
      <div class="stat"><div class="num">0.158</div><div class="lbl" data-i18n="tour.stat2"></div></div>
      <div class="stat"><div class="num up">-43%</div><div class="lbl" data-i18n="tour.stat3"></div></div>
      <div class="stat"><div class="num">2,056</div><div class="lbl" data-i18n="tour.stat4"></div></div>
    </div>

    <div class="grid grid-2">
      <div class="card">
        <h3 data-i18n="tour.lb.title"></h3>
        <p style="margin-bottom:12px;" data-i18n="tour.lb.desc"></p>
        <table id="lb">
          <thead><tr><th>#</th><th data-i18n="tour.th.forecaster"></th><th data-i18n="tour.th.forecasts"></th><th data-i18n="tour.th.brier"></th><th data-i18n="tour.th.cal"></th><th data-i18n="tour.th.tier"></th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
      <div>
        <div class="card" style="margin-bottom:18px;">
          <h3 data-i18n="tour.cal.title"></h3>
          <p style="margin-bottom:12px;" data-i18n="tour.cal.desc"></p>
          <div class="chart-box short"><canvas id="calChart"></canvas></div>
        </div>
        <div class="card">
          <h3 data-i18n="tour.src.title"></h3>
          <p style="margin-bottom:12px;" data-i18n="tour.src.desc"></p>
          <div class="chart-box short"><canvas id="srcChart"></canvas></div>
        </div>
      </div>
    </div>

    <div class="disclaimer" data-i18n="tour.disclaimer"></div>
  </div>
</section>

<footer>
  <div class="container footer-inner">
    <div data-i18n="footer.copy"></div>
    <div><a href="methodology.html" data-i18n="footer.method"></a></div>
  </div>
</footer>

<script src="js/data.js?v=11"></script>
<script src="js/i18n.js?v=11"></script>
<script src="js/app.js?v=11"></script>
<script>
document.querySelector("#lb tbody").innerHTML = OO.leaderboard.map(r => `
  <tr>
    <td class="num-cell">${r.rank}</td>
    <td><strong>${r.user}</strong></td>
    <td class="num-cell">${r.forecasts}</td>
    <td class="num-cell pos">${r.brier.toFixed(3)}</td>
    <td class="num-cell">${(100 * r.cal).toFixed(0)}%</td>
    <td><span class="tag ${r.streak === "Superforecaster" ? "green" : r.streak === "Top 1%" ? "purple" : ""}">${r.streak}</span></td>
  </tr>
`).join("");

const C = OO.calibration;
let charts = [];

function buildCharts() {
  charts.forEach(c => c.destroy());
  charts = [];

  charts.push(new Chart(document.getElementById("calChart"), {
    type: "line",
    data: {
      labels: C.bins.map(b => (100*b) + "%"),
      datasets: [
        { label: OO_T("ch.perfect"), data: C.bins, borderColor: "rgba(147,160,184,0.5)", borderDash: [5,5], pointRadius: 0 },
        { label: OO_T("ch.crowd"), data: C.crowd, borderColor: OO_COLORS.amber, backgroundColor: OO_COLORS.amber, tension: 0.2 },
        { label: OO_T("ch.supers"), data: C.supers, borderColor: OO_COLORS.green, backgroundColor: OO_COLORS.green, tension: 0.2 },
      ],
    },
    options: {
      maintainAspectRatio: false,
      scales: {
        y: { min: 0, max: 1, ticks: { callback: v => (100*v) + "%" }, title: { display: true, text: OO_T("ch.obs") } },
        x: { title: { display: true, text: OO_T("ch.prob") } },
      },
    },
  }));

  const srcKeys = ["src.supers", "src.ens", "src.mkt", "src.crowd", "src.naive"];
  charts.push(new Chart(document.getElementById("srcChart"), {
    type: "bar",
    data: {
      labels: srcKeys.map(k => OO_T(k)),
      datasets: [{
        label: OO_T("ch.brier"),
        data: OO.brierBySource.map(s => s.brier),
        backgroundColor: [OO_COLORS.green, OO_COLORS.accent, OO_COLORS.purple, OO_COLORS.amber, OO_COLORS.red].map(c => c + "c0"),
      }],
    },
    options: { maintainAspectRatio: false, indexAxis: "y", plugins: { legend: { display: false } }, scales: { x: { min: 0, max: 0.25 } } },
  }));
}

buildCharts();
document.addEventListener("oo:lang", buildCharts);
</script>
</body>
</html>
