<section>
  <div class="container">
    <h1 class="section-title" data-i18n="fin.title"></h1>
    <p class="section-sub" data-i18n="fin.sub"></p>

    <div class="card hide" id="liveCard" style="margin-bottom:18px; border-color:rgba(34,197,94,0.35);">
      <h3 data-i18n="mac.live.title"></h3>
      <p style="margin:6px 0 12px; font-size:0.82rem; color:var(--text-dim);" data-i18n="mac.live.sub"></p>
      <div class="stats-bar" id="liveGrid" style="grid-template-columns:repeat(auto-fit,minmax(140px,1fr));"></div>
    </div>

    <div class="card hide" id="stockCard" style="margin-bottom:18px; border-color:rgba(245,158,11,0.35);">
      <h3 data-i18n="fin.crypto.title"></h3>
      <p style="margin:6px 0 12px; font-size:0.82rem; color:var(--text-dim);" data-i18n="fin.crypto.sub"></p>
      <div class="stats-bar" id="stockGrid" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr));"></div>
    </div>

    <div class="card" style="margin-top:18px;">
      <h3 id="fedTitle"></h3>
      <p style="margin-bottom:14px;" data-i18n="mac.fed.desc"></p>
      <div class="chart-box"><canvas id="fedChart"></canvas></div>
    </div>

<script src="js/app.js?v=27"></script>
<script>
const M = OO.macro;
let fedChart = null;

function buildCharts() {
  if (fedChart) fedChart.destroy();
  document.getElementById("fedTitle").textContent = OO_T("mac.fed.prefix") + M.fedMeeting;
  fedChart = new Chart(document.getElementById("fedChart"), {
    type: "bar",
    data: {
      labels: M.fedProbs.map(d => d.move),
      datasets: [
        { label: OO_T("ch.model"), data: M.fedProbs.map(d => d.model), backgroundColor: "rgba(79,140,255,0.75)" },
        { label: OO_T("ch.marketOdds"), data: M.fedProbs.map(d => d.market), backgroundColor: "rgba(139,92,246,0.75)" },
      ],
    },
    options: {
      maintainAspectRatio: false,
      scales: { y: { max: 0.7, ticks: { callback: v => (100*v) + "%" } } },
    },
  });
}
buildCharts();
document.addEventListener("oo:lang", buildCharts);

/* live FX + Treasury rates (public CORS APIs, browser-direct; cards hidden on failure) */
(function () {
  const grid = document.getElementById("liveGrid");
  const show = () => document.getElementById("liveCard").classList.remove("hide");
  const stat = (num, lbl) =>
    `<div class="stat"><div class="num" style="font-size:1.15rem;">${num}</div><div class="lbl">${lbl}</div></div>`;
  fetch("https://api.frankfurter.dev/v1/latest?base=USD&symbols=EUR,CNY,JPY,GBP")
    .then(r => r.ok ? r.json() : null)
    .then(d => {
      if (!d || !d.rates) return;
      show();
      grid.insertAdjacentHTML("beforeend",
        ["EUR", "CNY", "JPY", "GBP"].map(c => stat(d.rates[c], `USD/${c} · ${d.date}`)).join(""));
    }).catch(() => {});
  fetch("https://api.fiscaldata.treasury.gov/services/api/fiscal_service/v2/accounting/od/avg_interest_rates?filter=security_desc:in:(Treasury%20Bills,Treasury%20Notes,Treasury%20Bonds)&sort=-record_date&page%5Bsize%5D=3")
    .then(r => r.ok ? r.json() : null)
    .then(d => {
      if (!d || !d.data || !d.data.length) return;
      show();
      grid.insertAdjacentHTML("beforeend",
        d.data.map(x => stat((+x.avg_interest_rate_amt).toFixed(2) + "%",
          `${x.security_desc.replace("Treasury ", "T-")} · ${x.record_date}`)).join(""));
    }).catch(() => {});

  /* tech mega-cap quotes (stockanalysis.com public API, CORS-open) */
  const TICKS = ["NVDA", "MSFT", "AAPL", "GOOGL", "META", "MU"];
  Promise.all(TICKS.map(t =>
    fetch("https://stockanalysis.com/api/quotes/s/" + t)
      .then(r => r.ok ? r.json() : null).catch(() => null)
  )).then(rs => {
    const rows = rs.map((d, i) => d && d.data && d.data.p != null
      ? { t: TICKS[i], p: d.data.p, cp: d.data.cp || 0 } : null).filter(Boolean);
    if (!rows.length) return;
    document.getElementById("stockCard").classList.remove("hide");
    document.getElementById("stockGrid").innerHTML = rows.map(r => `
      <div class="stat">
        <div class="num ${r.cp >= 0 ? "up" : "down"}" style="font-size:1.15rem;">$${r.p.toLocaleString("en-US")}</div>
        <div class="lbl">${r.t} · ${r.cp >= 0 ? "+" : ""}${r.cp.toFixed(2)}%</div>
      </div>`).join("");
  });
})();
</script>
</body>
